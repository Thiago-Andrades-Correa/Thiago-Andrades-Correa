name: Generate pacman animation

on:
  schedule:
    - cron: "0 */12 * * *" # Atualiza a cada 12 horas
  workflow_dispatch:
  push:
    branches:
    - main # Troque para 'ruset' se esta for sua branch principal

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # Aqui usamos a ferramenta 'snk', mas configuramos para ser o PACMAN
      - name: Gerar Animacao Pacman
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?palette=github-light&color_snake=#f7df1e
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f7df1e
        # O segredo: 'palette=github-light' faz ele reconhecer todos os verdes
        # E 'color_snake=#f7df1e' transforma a "cobra" no Pac-Man Amarelo

      - name: Enviar para branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
