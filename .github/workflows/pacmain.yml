name: Gerar animação Pacman

on:
  schedule:
    - cron: "0 */12 * * *" # Executa a cada 12 horas
  workflow_dispatch:
  push:
    branches:
    - main # Se sua branch principal for 'ruset', mude este nome para 'ruset'

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera a animação com o Pac-Man comendo TODAS as contribuições (verdes claros e escuros)
      - name: generate-pacman-graph
        uses: platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg?color_snake=#f7df1e&color_dots=#bfbdbe,#f7df1e
            dist/pacman-contribution-graph-dark.svg?color_snake=#f7df1e&color_dots=#bfbdbe,#f7df1e

      # Envia os arquivos gerados para a branch 'output'
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
